---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Chart Builder

on:
  workflow_call:
    inputs:
      artifactName:
        type: string
        description: Name of the Published Chart
        required: true
      source:
        type: string
        description: Source block from metadata.yaml, as JSON
        required: true
      release:
        type: boolean
        description: Release
        required: true

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    outputs:
      app-exists: ${{ steps.app.outputs.exists }}
      source-type: ${{ steps.source.outputs.type }}
      version: ${{ steps.source.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Get Repository Name
        id: repository
        run: |
          echo "name=${GITHUB_REPOSITORY#*/}" >> $GITHUB_OUTPUT

      - name: Determine Source Type and Version
        id: source
        env:
          SOURCE: ${{ inputs.source }}
        run: |
          if jq -e 'has("helm")' <<< "$SOURCE" > /dev/null; then
            echo "type=helm" >> $GITHUB_OUTPUT
            echo "version=$(jq -r '.helm.version' <<< "$SOURCE")" >> $GITHUB_OUTPUT
          elif jq -e 'has("git")' <<< "$SOURCE" > /dev/null; then
            echo "type=git" >> $GITHUB_OUTPUT
            echo "version=$(jq -r '.git.tag' <<< "$SOURCE")" >> $GITHUB_OUTPUT
          else
            echo "::error::Source must define exactly one of: helm, git"
            exit 1
          fi

      - name: Check For Exising Chart
        uses: ./.github/actions/app-exists
        id: app
        with:
          app: ${{ steps.repository.outputs.name }}/${{ inputs.artifactName }}

  build:
    name: Build (${{ needs.plan.outputs.version }})
    runs-on: ubuntu-latest
    needs: ["plan"]
    env:
      ARTIFACT_NAME: ${{ inputs.artifactName }}
      SOURCE: ${{ inputs.source }}
      VERSION: ${{ needs.plan.outputs.version }}
    steps:
      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - if: ${{ inputs.release }}
        name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v2.6.1 # TODO: remove after Flux 2.8 with support for cosign v3

      - if: ${{ inputs.release }}
        name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - if: ${{ needs.plan.outputs.source-type == 'helm' }}
        name: Fetch Helm Chart
        run: |
          registry=$(jq -r '.helm.registry' <<< "$SOURCE")
          chart=$(jq -r --arg fallback "$ARTIFACT_NAME" '.helm.chart // $fallback' <<< "$SOURCE")
          helm repo add upstream "$registry"
          helm repo update upstream
          helm pull "upstream/$chart" --version "$VERSION" --untar --untardir ./src

      - if: ${{ needs.plan.outputs.source-type == 'git' }}
        name: Fetch Git Chart
        run: |
          repository=$(jq -r '.git.repository' <<< "$SOURCE")
          path=$(jq -r '.git.path' <<< "$SOURCE")
          git clone --depth 1 --branch "$VERSION" "$repository" ./git-src
          mkdir -p ./src
          cp -r "./git-src/${path}" "./src/$(basename "$path")"

      - name: Override Chart Name
        run: |
          yq --inplace ".name = \"$ARTIFACT_NAME\"" ./src/*/Chart.yaml

      - name: Package Chart
        run: |
          mkdir -p dist
          helm package ./src/* --version "$VERSION" --destination ./dist

      - if: ${{ inputs.release }}
        name: Push Chart
        run: |
          helm push ./dist/*.tgz oci://ghcr.io/${{ github.repository }}

      - if: ${{ inputs.release }}
        name: Sign artifacts with Cosign
        run: |
          cosign sign --yes "ghcr.io/${{ github.repository }}/${ARTIFACT_NAME}:${VERSION}"

  release:
    if: ${{ inputs.release && needs.plan.outputs.app-exists != 'true' }}
    name: Release
    needs: ["plan", "build"]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Get Repository Name
        id: repository
        run: |
          echo "name=${GITHUB_REPOSITORY#*/}" >> $GITHUB_OUTPUT

      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Get Release Tag
        uses: ./.github/actions/release-tag
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Create Release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          body: |
            > [!NOTE]
            > A new chart has been added.

            ## 📦 Chart

            **Name**: [${{ inputs.artifactName }}](https://github.com/${{ github.repository }}/pkgs/container/${{ steps.repository.outputs.name }}%2F${{ inputs.artifactName }})
          tag: ${{ steps.release.outputs.tag }}
          token: ${{ steps.app-token.outputs.token }}

  announce:
    if: ${{ inputs.release && !cancelled() }}
    needs: ["plan", "build", "release"]
    name: Notify
    runs-on: ubuntu-latest
    steps:
      - if: ${{ contains(needs.*.result, 'failure') }}
        name: Send Discord Webhook
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1.16.0
        with:
          color: "0xFF0000"
          description: |
            Name: `${{ inputs.artifactName }}`
            Version: `${{ needs.plan.outputs.version }}`
            [Rebuild](${{ github.server_url }}/${{ github.repository }}/actions/workflows/release.yaml)
          nodetail: true
          title: Chart build failed
          username: GitHub Actions
          url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
